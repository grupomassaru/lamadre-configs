name: Repository task
description: Track a repo task with portfolio metadata.
title: "[Repo] "
labels: ["type:docs"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What needs to be changed, validated, or documented?
    validations:
      required: true
  - type: dropdown
    id: evidence
    attributes:
      label: Evidence needed
      options:
        - GitHub only
        - CI green
        - VPS runtime proof
        - Lovable Cloud proof
        - Supabase proof
        - Production proof
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: No secrets or credentials will be exposed.
          required: true
        - label: Secret/key rotation is not requested unless Rafael confirms twice.
          required: true